epochs: 200
batch_size: 32
lr: 3.0e-4
weight_decay: 1.0e-2
grad_clip: 1.0
val_split: 0.1
seed: 42
num_workers: 8
checkpoint_freq: 50
max_steps: null

# Scheduled sampling
ss_warmup: 10    # Epochs of pure teacher forcing before ramp
ss_k: 0.05      # Ramp rate: prob = min(1, (epoch - warmup) * k)

scheduler:
  name: cosine   # cosine | reduce_on_plateau | none

# W&B logging
wandb:
  enabled: false
  project: "latent-beam-dynamics"
  entity: null
  offline: true
  tags: []
  notes: null
